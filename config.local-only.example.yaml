# local-splitter config — local-only mode (no cloud backend).
#
# Use this when the calling agent (Claude Code, Cursor, etc.) IS the
# cloud model. The splitter runs tactics locally and returns either a
# local answer or the transformed prompt for the agent to handle.

version: 1

models:
  local:
    backend: ollama
    endpoint: http://127.0.0.1:11434
    chat_model: llama3.2:3b
    embed_model: nomic-embed-text
    num_ctx: 8192

  # No cloud section — the agent is the cloud model.

pipeline:
  t1_route:      { enabled: true, trivial_threshold: 0.8 }
  t2_compress:   { enabled: true, ratio_target: 0.5 }
  t3_sem_cache:  { enabled: true, similarity_threshold: 0.92, ttl: 86400 }
  t5_diff:       { enabled: true }
  # T4 (draft) and T6 (intent) are less useful in local-only mode.
  t4_draft:      { enabled: false }
  t6_intent:     { enabled: false }
  t7_batch:      { enabled: false }
