name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Sync and lint
        run: |
          uv sync --all-groups
          uv run ruff check src/ tests/

      - name: Tests
        run: uv run pytest -q
