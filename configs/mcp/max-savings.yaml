# MCP Max Savings — T1 + T2 + T3 (no cloud backend)
#
# Adds semantic caching. Best for agents with repetitive queries
# (onboarding sessions, support, multiple users on the same codebase).
# T3 catches near-duplicate prompts and returns cached responses
# without any model call.
#
# Requires nomic-embed-text model for embeddings:
#   ollama pull nomic-embed-text
#
# How it works with your agent:
#   1. Agent calls split.transform with a prompt
#   2. TRIVIAL → local answer (zero tokens)
#   3. CACHE HIT → cached response (zero tokens)
#   4. COMPLEX + CACHE MISS → compressed prompt returned
#
# Eval results (llama3.2:3b, 10 samples/workload):
#   WL1 edit:    43% cloud token savings
#   WL2 explain: 80% cloud token savings
#   WL3 chat:    60% cloud token savings
#   WL4 RAG:     44% cloud token savings
#   Average:     56% cloud token savings
#
# Note: T3 savings compound with query repetition. The eval uses
# single-pass workloads so the cache benefit is understated here.

version: 1

models:
  local:
    backend: ollama
    endpoint: http://127.0.0.1:11434
    chat_model: llama3.2:3b
    embed_model: nomic-embed-text
    num_ctx: 8192

pipeline:
  t1_route:      { enabled: true, trivial_threshold: 0.8 }
  t2_compress:   { enabled: true, ratio_target: 0.5 }
  t3_sem_cache:  { enabled: true, similarity_threshold: 0.92, ttl: 86400 }
  t4_draft:      { enabled: false }
  t5_diff:       { enabled: false }
  t6_intent:     { enabled: false }
  t7_batch:      { enabled: false }
