# Maximum savings — T1 + T2 + T3
#
# Adds semantic caching on top of routing + compression. Best for
# repetitive workloads (support bots, onboarding assistants, multi-user
# teams working on the same codebase).
#
# T3 catches near-duplicate queries across sessions. Marginal on
# single-pass workloads but compounds with repetition.
#
# Eval results (llama3.2:3b local, gemma3 cloud):
#   WL1 edit:    43% savings
#   WL2 explain: 80% savings
#   WL3 chat:    60% savings
#   WL4 RAG:     44% savings

version: 1

models:
  local:
    backend: ollama
    endpoint: http://127.0.0.1:11434
    chat_model: llama3.2:3b
    embed_model: nomic-embed-text
    num_ctx: 8192

  cloud:
    backend: openai_compat
    endpoint: https://api.openai.com/v1
    chat_model: gpt-4o-mini
    api_key_env: OPENAI_API_KEY

pipeline:
  t1_route:      { enabled: true, trivial_threshold: 0.8 }
  t2_compress:   { enabled: true, ratio_target: 0.5 }
  t3_sem_cache:  { enabled: true, similarity_threshold: 0.92, ttl: 86400 }
  t4_draft:      { enabled: false }
  t5_diff:       { enabled: false }
  t6_intent:     { enabled: false }
  t7_batch:      { enabled: false }
