# Local-only MCP mode — no cloud backend
#
# For agents that ARE the cloud model (Claude Code, Cursor).
# The splitter runs tactics locally and returns either:
#   - A local answer for trivial requests (zero cloud tokens)
#   - Transformed/compressed messages for the agent's own model
#
# Usage:
#   cp configs/local-only-mcp.yaml config.yaml
#   uv run local-splitter serve-mcp --config config.yaml
#
# Register with Claude Code in your MCP config, then the agent
# can call split.transform before sending prompts to its own model.

version: 1

models:
  local:
    backend: ollama
    endpoint: http://127.0.0.1:11434
    chat_model: llama3.2:3b
    embed_model: nomic-embed-text
    num_ctx: 8192

  # No cloud — the agent is the cloud model.

pipeline:
  t1_route:      { enabled: true, trivial_threshold: 0.8 }
  t2_compress:   { enabled: true, ratio_target: 0.5 }
  t3_sem_cache:  { enabled: true, similarity_threshold: 0.92, ttl: 86400 }
  t4_draft:      { enabled: false }
  t5_diff:       { enabled: true }
  t6_intent:     { enabled: false }
  t7_batch:      { enabled: false }
