# Conservative — T1 only
#
# Minimal intervention. Routes trivial requests locally, passes
# everything else to the cloud untouched. Lowest quality risk — the
# only failure mode is misclassifying a complex request as trivial
# (12% false-positive rate on edit-heavy workloads).
#
# Start here if you're unsure. Upgrade to recommended.yaml once
# you're comfortable with the savings.
#
# Eval results (llama3.2:3b local, gemma3 cloud):
#   WL1 edit:    29% savings
#   WL2 explain: 69% savings
#   WL3 chat:    59% savings
#   WL4 RAG:     38% savings

version: 1

models:
  local:
    backend: ollama
    endpoint: http://127.0.0.1:11434
    chat_model: llama3.2:3b
    num_ctx: 8192

  cloud:
    backend: openai_compat
    endpoint: https://api.openai.com/v1
    chat_model: gpt-4o-mini
    api_key_env: OPENAI_API_KEY

pipeline:
  t1_route:      { enabled: true, trivial_threshold: 0.8 }
  t2_compress:   { enabled: false }
  t3_sem_cache:  { enabled: false }
  t4_draft:      { enabled: false }
  t5_diff:       { enabled: false }
  t6_intent:     { enabled: false }
  t7_batch:      { enabled: false }
