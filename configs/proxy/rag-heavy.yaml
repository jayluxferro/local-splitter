# RAG-heavy workloads — all tactics
#
# For workloads with long system prompts and retrieved context chunks
# (10-40K token inputs). Enables T4 (draft-review) which becomes
# net-positive when the local model can absorb long-context synthesis.
# Also enables T5 (diff) which acts as a secondary compressor on
# RAG content.
#
# WARNING: T4 increases cloud input tokens on short-output workloads.
# Only use this config if your workload is genuinely RAG-heavy.
#
# Eval results (llama3.2:3b local, gemma3 cloud):
#   WL4 RAG: 51% savings (best of any config on this workload)

version: 1

models:
  local:
    backend: ollama
    endpoint: http://127.0.0.1:11434
    chat_model: llama3.2:3b
    embed_model: nomic-embed-text
    num_ctx: 8192

  cloud:
    backend: openai_compat
    endpoint: https://api.openai.com/v1
    chat_model: gpt-4o-mini
    api_key_env: OPENAI_API_KEY

pipeline:
  t1_route:      { enabled: true, trivial_threshold: 0.8 }
  t2_compress:   { enabled: true, ratio_target: 0.5 }
  t3_sem_cache:  { enabled: true, similarity_threshold: 0.92, ttl: 86400 }
  t4_draft:      { enabled: true }
  t5_diff:       { enabled: true }
  t6_intent:     { enabled: false }
  t7_batch:      { enabled: false }
