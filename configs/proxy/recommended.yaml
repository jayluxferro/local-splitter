# Recommended default — T1 + T2
#
# Best general-purpose configuration. Achieves 45-79% cloud token
# savings across most workload types with minimal quality loss.
#
# T1 routes trivial requests locally (~30-60% of coding-agent traffic).
# T2 compresses prompts for complex requests before they hit the cloud.
#
# Eval results (llama3.2:3b local, gemma3 cloud):
#   WL1 edit:    45% savings
#   WL2 explain: 79% savings
#   WL3 chat:    57% savings
#   WL4 RAG:     44% savings

version: 1

models:
  local:
    backend: ollama
    endpoint: http://127.0.0.1:11434
    chat_model: llama3.2:3b
    embed_model: nomic-embed-text
    num_ctx: 8192

  cloud:
    backend: openai_compat
    endpoint: https://api.openai.com/v1
    chat_model: gpt-4o-mini
    api_key_env: OPENAI_API_KEY

pipeline:
  t1_route:      { enabled: true, trivial_threshold: 0.8 }
  t2_compress:   { enabled: true, ratio_target: 0.5 }
  t3_sem_cache:  { enabled: false }
  t4_draft:      { enabled: false }
  t5_diff:       { enabled: false }
  t6_intent:     { enabled: false }
  t7_batch:      { enabled: false }
